---
- name: Provision OpenShift Virtualization VM
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vm_vars.yml

  tasks:
    - name: Ensure the Fedora VirtualMachine is present and running
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{ vm_name }}"
            namespace: "{{ vm_namespace }}"
            labels:
              app: "{{ vm_name }}"
          spec:
            running: true
            template:
              metadata:
                labels:
                  kubevirt.io/domain: "{{ vm_name }}"
              spec:
                domain:
                  cpu:
                    cores: "{{ vm_cpus_cores }}"
                  resources:
                    requests:
                      memory: "{{ vm_memory }}"
                  devices:
                    disks:
                      - disk:
                          bus: virtio
                        name: rootdisk
                      - disk:
                          bus: virtio
                        name: cloudinitdisk
                    interfaces:
                      - name: default
                        masquerade: {}
                        macAddress: "{{ vm_macaddress }}"
                networks:
                  - name: default
                    pod: {}
                volumes:
                  - dataVolume:
                      name: "{{ vm_name }}-rootdisk"
                    name: rootdisk
                  # Cloud-init injection for the SSH key
                  - cloudInitNoCloud:
                      userData: |-
                        #cloud-config
                        users:
                          - name: fedora
                            sudo: ALL=(ALL) NOPASSWD:ALL
                            ssh_authorized_keys:
                              - "{{ ssh_public_key }}"
                    name: cloudinitdisk
            # Define the DataVolume to clone the default OpenShift Virt Fedora image
            dataVolumeTemplates:
              - metadata:
                  name: "{{ vm_name }}-rootdisk"
                spec:
                  sourceRef:
                    kind: DataSource
                    name: fedora # This points to the default OpenShift Virt boot source
                    namespace: openshift-virtualization-os-images
                  storage:
                    resources:
                      requests:
                        storage: "{{ boot_image_size }}"
