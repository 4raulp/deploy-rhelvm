---
- name: Provision OpenShift Virtualization VM
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vm_vars.yml

  tasks:
    # STEP 1: Create the Secret containing the public key
    - name: Ensure SSH Key Secret is present
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ vm_name }}-ssh-key"
            namespace: "{{ vm_namespace }}"
          type: Opaque
          stringData:
            key: "{{ ssh_public_key }}"

    # STEP 2: Create the VirtualMachine referencing the Secret
    - name: Ensure the Fedora VirtualMachine is present and running
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{ vm_name }}"
            namespace: "{{ vm_namespace }}"
            labels:
              app: "{{ vm_name }}"
          spec:
            running: true
            template:
              metadata:
                labels:
                  kubevirt.io/domain: "{{ vm_name }}"
              spec:
                # Dynamically inject the SSH key from the secret created in Step 1
                accessCredentials:
                  - sshPublicKey:
                      propagationMethod:
                        noCloud: {}
                      source:
                        secret:
                          secretName: "{{ vm_name }}-ssh-key"
                domain:
                  cpu:
                    cores: "{{ vm_cpus_cores }}"
                  resources:
                    requests:
                      memory: "{{ vm_memory }}"
                  devices:
                    disks:
                      - disk:
                          bus: virtio
                        name: rootdisk
                      - disk:
                          bus: virtio
                        name: cloudinitdisk
                    interfaces:
                      - name: default
                        masquerade: {}
                        macAddress: "{{ vm_macaddress }}"
                networks:
                  - name: default
                    pod: {}
                volumes:
                  - dataVolume:
                      name: "{{ vm_name }}-rootdisk"
                    name: rootdisk
                  # Configure user, password, and SSH password auth via cloud-init
                  - cloudInitNoCloud:
                      userData: |-
                        #cloud-config
                        user: rhel
                        password: openshift
                        chpasswd:
                          expire: false
                        ssh_pwauth: true
                    name: cloudinitdisk

            dataVolumeTemplates:
              - metadata:
                  name: "{{ vm_name }}-rootdisk"
                spec:
                  sourceRef:
                    kind: DataSource
                    name: fedora
                    namespace: openshift-virtualization-os-images
                  storage:
                    storageClassName: ocs-external-storagecluster-ceph-rbd
                    resources:
                      requests:
                        storage: "{{ boot_image_size }}"

    - name: Pause for 30 seconds for VM initialization
      ansible.builtin.pause:
        seconds: 65
